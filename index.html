<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gacha Quest | Hub Principal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <button class="nav-btn" onclick="mostrar('lobby')">🏠 Inicio</button>
        <button class="nav-btn" onclick="mostrar('equipo')">🛡️ Equipo</button>
        <button class="nav-btn" onclick="mostrar('pokedex')">📖 Dex</button>
        <button class="nav-btn gacha-btn" onclick="tirarGacha()">✨ Invocar</button>
    </nav>

    <div class="viewport">
        <div id="pantalla-lobby" class="pantalla active">
            <div class="lobby-container">
                <div class="main-stage">
                    <div id="hero-display" class="hero-display">
                        </div>
                    <button class="btn-play" onclick="iniciarBatalla()">¡A LUCHAR!</button>
                </div>

                <aside class="news-sidebar">
                    <h3>NOTICIAS</h3>
                    <div class="news-item"><b>Evento:</b> ¡Probabilidad x2 en Legendarios!</div>
                    <div class="news-item"><b>Tip:</b> Usa el tipo Agua contra el Fuego.</div>
                    <div class="news-item"><b>Update:</b> Sistema de combate V2 activado.</div>
                </aside>
            </div>
        </div>

        <div id="pantalla-equipo" class="pantalla" style="display:none;">
            <h2 class="section-title">Gestionar Escuadrón</h2>
            <div id="equipo-grid" class="grid"></div>
        </div>

        <div id="pantalla-pokedex" class="pantalla" style="display:none;">
            <h2 class="section-title">Colección de Héroes</h2>
            <div id="dex-grid" class="grid"></div>
        </div>
    </div>

    <div id="battle-screen">
        </div>

    <script src="database.js"></script>
    <script src="logic.js"></script>
    <script src="battle.js"></script>
    <script>
        function mostrar(id) {
    // Ocultar todas las pantallas
    document.querySelectorAll('.pantalla').forEach(p => p.style.display = 'none');
    
    // Mostrar la elegida
    const pantallaActual = document.getElementById('pantalla-' + id);
    if(pantallaActual) pantallaActual.style.display = 'block';

    // EJECUTAR EL RENDER CORRESPONDIENTE
    if(id === 'lobby') renderLobby();
    if(id === 'equipo') renderEquipo(); // <--- ESTO ES VITAL
    if(id === 'pokedex') renderDex();
}
    </script>
</body>
</html>
