<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gacha Quest | Pixel Dex</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --primary: #38bdf8;
            --text: #f1f5f9;
            /* Rarezas */
            --comun: #94a3b8;
            --raro: #4ade80;
            --epico: #a855f7;
            --legendario: #f59e0b;
            --secreto: #f43f5e;
        }

        body {
            margin: 0;
            font-family: 'Courier New', Courier, monospace; /* Toque retro */
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .pantalla { text-align: center; width: 95%; max-width: 800px; height: 90vh; display: flex; flex-direction: column; }
        .oculto { display: none !important; }

        /* Estética Pixel para botones */
        .btn-principal {
            background: var(--primary);
            color: #000;
            border: 4px solid #fff;
            padding: 10px 20px;
            font-weight: bold;
            cursor: pointer;
            image-rendering: pixelated;
            margin: 10px;
        }

        /* --- CONTENEDOR POKEDEX --- */
        .album-container {
            background: #27272a;
            border: 6px solid #52525b;
            border-radius: 10px;
            flex-grow: 1;
            overflow-y: auto;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 15px;
        }

        /* Miniatura de personaje en el álbum */
        .slot-dex {
            background: #3f3f46;
            border: 3px solid #71717a;
            padding: 10px;
            border-radius: 5px;
            position: relative;
            font-size: 0.8rem;
        }

        .slot-dex img {
            width: 64px;
            height: 64px;
            image-rendering: pixelated; /* ¡IMPORTANTE PARA PIXEL ART! */
        }

        .mini-tag {
            font-size: 0.6rem;
            padding: 2px 4px;
            border-radius: 3px;
            display: inline-block;
            margin-top: 5px;
        }

        /* Pestañas de Sagas */
        .tabs-sagas {
            display: flex;
            gap: 5px;
            margin-bottom: 10px;
            overflow-x: auto;
            padding-bottom: 5px;
        }

        .tab {
            background: #3f3f46;
            padding: 5px 15px;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .tab.activa {
            border-color: var(--primary);
            background: var(--card);
        }

        /* Carta de Resultado (Gacha) */
        .carta-grande {
            background: var(--card);
            border: 8px double var(--comun);
            padding: 20px;
            margin: 20px auto;
            width: 250px;
        }
    </style>
</head>
<body>

    <section id="p-inicio" class="pantalla">
        <h1 style="font-size: 3rem;">GACHA QUEST</h1>
        <p>PIXEL EDITION</p>
        <button class="btn-principal" onclick="navegar('menu')">START</button>
    </section>

    <section id="p-menu" class="pantalla oculto">
        <h2>MENU</h2>
        <button class="btn-principal" onclick="tirarGacha()">INVOCAR (GACHA)</button>
        <button class="btn-principal" onclick="abrirAlbum()">COLECCION (DEX)</button>
        <button class="btn-principal" onclick="borrarTodo()" style="background: var(--danger)">RESET</button>
    </section>

    <section id="p-resultado" class="pantalla oculto">
        <div id="res-carta" class="carta-grande">
            <h4 id="res-rareza">COMÚN</h4>
            <div id="res-sprite" style="font-size: 4rem;">❓</div>
            <h3 id="res-nombre">Héroe</h3>
            <p id="res-saga" style="font-size: 0.7rem; color: var(--primary);">Saga</p>
            <div style="font-size: 0.8rem; text-align: left; margin-top: 10px;">
                HP: <span id="res-hp">0</span><br>
                ATK: <span id="res-atk">0</span>
            </div>
        </div>
        <button class="btn-principal" onclick="navegar('menu')">VOLVER</button>
    </section>

    <section id="p-album" class="pantalla oculto">
        <h2>PIXEL-DEX</h2>
        
        <div class="tabs-sagas" id="tabs-sagas">
            </div>

        <div class="album-container" id="contenedor-album">
            </div>

        <button class="btn-principal" onclick="navegar('menu')">CERRAR</button>
    </section>

    <script>
        // 1. BASE DE DATOS (Sagas y Personajes)
        // Nota: He usado emojis como "sprites" temporales, pero puedes poner URLs de imágenes pixel art.
        const database = [
            { id: 1, saga: "Kanto", nombre: "Bulbasaur", tipo: "Planta", desc: "Una semilla en su lomo.", emoji: "🍃" },
            { id: 2, saga: "Kanto", nombre: "Charmander", tipo: "Fuego", desc: "La llama indica su vida.", emoji: "🔥" },
            { id: 3, saga: "Kanto", nombre: "Squirtle", tipo: "Agua", desc: "Su caparazón lo protege.", emoji: "💧" },
            { id: 4, saga: "Z-Warriors", nombre: "Goku", tipo: "Fuego", desc: "El saiyan legendario.", emoji: "👊" },
            { id: 5, saga: "Z-Warriors", nombre: "Vegeta", tipo: "Fuego", desc: "El príncipe saiyan.", emoji: "👑" },
            { id: 6, saga: "Shinobi", nombre: "Naruto", tipo: "Viento", desc: "Séptimo Hokage.", emoji: "🍥" }
        ];

        const rarezas = [
            { n: "Común", c: 60, m: 1, color: "var(--comun)" },
            { n: "Raro", c: 25, m: 1.5, color: "var(--raro)" },
            { n: "Épico", c: 10, m: 2.2, color: "var(--epico)" },
            { n: "Legendario", c: 4, m: 3.5, color: "var(--legendario)" },
            { n: "Secreto", c: 1, m: 6, color: "var(--secreto)" }
        ];

        let miColeccion = JSON.parse(localStorage.getItem("dex_coleccion")) || [];
        let sagaActual = "Kanto";

        function tirarGacha() {
            let r = Math.random() * 100;
            let acum = 0;
            let cal = rarezas[0];
            for (let c of rarezas) { acum += c.c; if (r <= acum) { cal = c; break; } }

            const pBase = database[Math.floor(Math.random() * database.length)];
            
            const nuevo = {
                ...pBase,
                instanciaId: Date.now(),
                calidad: cal.n,
                hp: Math.floor(100 * cal.m),
                atk: Math.floor(20 * cal.m),
                color: cal.color
            };

            miColeccion.push(nuevo);
            localStorage.setItem("dex_coleccion", JSON.stringify(miColeccion));
            mostrarResultado(nuevo);
        }

        function mostrarResultado(h) {
            document.getElementById('res-nombre').innerText = h.nombre;
            document.getElementById('res-sprite').innerText = h.emoji;
            document.getElementById('res-rareza').innerText = h.calidad;
            document.getElementById('res-rareza').style.color = h.color;
            document.getElementById('res-saga').innerText = "SAGA: " + h.saga;
            document.getElementById('res-hp').innerText = h.hp;
            document.getElementById('res-atk').innerText = h.atk;
            document.getElementById('res-carta').style.borderColor = h.color;
            navegar('resultado');
        }

        function abrirAlbum() {
            renderTabs();
            renderPersonajes();
            navegar('album');
        }

        function renderTabs() {
            const container = document.getElementById('tabs-sagas');
            const sagasUnicas = [...new Set(database.map(p => p.saga))];
            
            container.innerHTML = sagasUnicas.map(s => `
                <div class="tab ${s === sagaActual ? 'activa' : ''}" onclick="cambiarSaga('${s}')">
                    ${s}
                </div>
            `).join('');
        }

        function cambiarSaga(s) {
            sagaActual = s;
            renderTabs();
            renderPersonajes();
        }

        function renderPersonajes() {
            const container = document.getElementById('contenedor-album');
            // Filtramos la colección por la saga seleccionada
            const filtrados = miColeccion.filter(p => p.saga === sagaActual);

            if (filtrados.length === 0) {
                container.innerHTML = "<p style='grid-column: 1/-1'>No tienes a nadie de esta saga todavía.</p>";
                return;
            }

            container.innerHTML = filtrados.map(p => `
                <div class="slot-dex" style="border-color: ${p.color}">
                    <div style="font-size: 2rem;">${p.emoji}</div>
                    <div style="font-weight: bold;">${p.nombre}</div>
                    <div class="mini-tag" style="background: ${p.color}; color: #000">${p.calidad}</div>
                    <div style="font-size: 0.6rem; color: #94a3b8; margin-top: 4px;">ATK: ${p.atk}</div>
                </div>
            `).join('');
        }

        function navegar(id) {
            document.querySelectorAll('.pantalla').forEach(p => p.classList.add('oculto'));
            document.getElementById('p-' + id).classList.remove('oculto');
        }

        function borrarTodo() { if(confirm("¿Borrar todo?")) { localStorage.clear(); location.reload(); } }
    </script>
</body>
</html>
