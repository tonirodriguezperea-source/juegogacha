<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gacha Quest | Battle System</title>
    <style>
        :root {
            --bg-dark: #020617; --bg-panel: #0f172a; --accent: #38bdf8;
            --text-main: #f1f5f9; --text-dim: #94a3b8; --border: #1e293b;
            --comun: #94a3b8; --raro: #4ade80; --epico: #a855f7; --legendario: #f59e0b;
            --fuego: #f87171; --agua: #60a5fa; --planta: #4ade80;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { margin: 0; background-color: var(--bg-dark); color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        nav { display: flex; justify-content: center; background: var(--bg-panel); border-bottom: 2px solid var(--border); z-index: 100; }
        .nav-item { padding: 20px 25px; cursor: pointer; font-weight: bold; color: var(--text-dim); text-transform: uppercase; transition: 0.3s; }
        .nav-item.active { color: var(--accent); border-bottom: 3px solid var(--accent); }

        .viewport { flex-grow: 1; overflow-y: auto; padding: 20px; position: relative; }
        .pantalla { display: none; width: 100%; max-width: 1200px; margin: 0 auto; }
        .pantalla.active { display: flex; flex-direction: column; }

        /* --- ESTILOS DE BATALLA --- */
        #battle-scene {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, #0f172a, #020617);
            z-index: 2000; display: none; flex-direction: column; padding: 20px;
        }
        .battle-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; height: 60%; align-items: center; }
        .fighter { display: flex; flex-direction: column; align-items: center; transition: 0.3s; }
        .fighter-emoji { font-size: 8rem; filter: drop-shadow(0 0 20px rgba(255,255,255,0.2)); }
        
        .hp-bar-container { width: 100%; max-width: 250px; background: #334155; height: 20px; border-radius: 10px; margin: 10px 0; overflow: hidden; border: 2px solid #1e293b; }
        .hp-bar-fill { background: #22c55e; height: 100%; width: 100%; transition: 0.5s; }
        .energy-dots { display: flex; gap: 5px; margin-top: 5px; }
        .energy-dot { width: 15px; height: 15px; border-radius: 50%; background: #1e293b; border: 1px solid var(--accent); }
        .energy-dot.filled { background: var(--accent); box-shadow: 0 0 8px var(--accent); }

        .battle-log { background: rgba(0,0,0,0.4); border: 1px solid var(--border); padding: 15px; height: 120px; overflow-y: auto; border-radius: 10px; margin: 20px 0; font-size: 0.9rem; }
        .battle-actions { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .btn-action { background: var(--bg-panel); border: 1px solid var(--accent); color: white; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-action:hover:not(:disabled) { background: var(--accent); color: black; }
        .btn-action:disabled { opacity: 0.4; cursor: not-allowed; border-color: var(--border); }

        /* Estilos base reutilizados */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .card { background: var(--bg-panel); border: 2px solid var(--border); border-radius: 15px; padding: 12px; text-align: center; position: relative; cursor: pointer; }
        .rarity-line { height: 4px; width: 40px; margin: 5px auto; border-radius: 2px; }
    </style>
</head>
<body>

    <nav id="main-nav">
        <div class="nav-item active" onclick="tab(this, 'lobby')">Inicio</div>
        <div class="nav-item" onclick="tab(this, 'pokedex')">Pokedex</div>
        <div class="nav-item" onclick="tab(this, 'equipo')">Equipo</div>
        <div class="nav-item" onclick="tirarGacha()" style="color: #fbbf24;">INVOCAR</div>
    </nav>

    <div class="viewport">
        <section id="lobby" class="pantalla active">
            <div style="display: grid; grid-template-columns: 1fr 300px; gap: 20px;">
                <div style="background: radial-gradient(circle, #1e293b 0%, #020617 100%); border-radius: 20px; height: 450px; position: relative; display: flex; justify-content: center; align-items: flex-end; padding-bottom: 80px;" id="hero-scene"></div>
                <div style="background: var(--bg-panel); padding: 20px; border-radius: 20px; border: 1px solid var(--border);">
                    <h3 style="color: var(--accent); margin-top:0;">REGLAS DE BATALLA</h3>
                    <p style="font-size: 0.85rem; color: var(--text-dim);">
                        • <b>Recargar:</b> Gana +1 carga.<br>
                        • <b>Atacar:</b> Gasta 1 carga.<br>
                        • <b>Especial:</b> Gasta 2 cargas (x3 Daño).<br>
                        • <b>Defensa:</b> Mitad de daño (No spam).
                    </p>
                </div>
            </div>
        </section>

        <section id="pokedex" class="pantalla">
            <h1 style="text-align:center;">PIXEL-DEX</h1>
            <div class="grid" id="dex-grid"></div>
        </section>

        <section id="equipo" class="pantalla">
            <h1 style="text-align:center;">TU EQUIPO</h1>
            <div class="grid" id="equipo-grid"></div>
        </section>
    </div>

    <div id="battle-scene">
        <div class="battle-grid">
            <div class="fighter" id="player-fighter">
                <div class="hp-bar-container"><div id="player-hp" class="hp-bar-fill"></div></div>
                <div class="fighter-emoji" id="player-img">❓</div>
                <h2 id="player-name">Héroe</h2>
                <div class="energy-dots" id="player-energy"></div>
            </div>
            <div class="fighter" id="enemy-fighter">
                <div class="hp-bar-container"><div id="enemy-hp" class="hp-bar-fill"></div></div>
                <div class="fighter-emoji" id="enemy-img">👾</div>
                <h2 id="enemy-name">Rival</h2>
                <div class="energy-dots" id="enemy-energy"></div>
            </div>
        </div>

        <div class="battle-log" id="battle-log">¡Un rival aparece! Prepárate...</div>

        <div class="battle-actions">
            <button class="btn-action" onclick="playerMove('charge')">🔋 RECARGAR</button>
            <button class="btn-action" id="btn-atk" onclick="playerMove('attack')">⚔️ ATACAR (1)</button>
            <button class="btn-action" id="btn-super" onclick="playerMove('super')">🌟 ESPECIAL (2)</button>
            <button class="btn-action" id="btn-def" onclick="playerMove('defend')">🛡️ DEFENSA</button>
            <button class="btn-action" onclick="openSwitchMenu()">🔄 CAMBIAR</button>
            <button class="btn-action" style="border-color: #ef4444;" onclick="endBattle(false)">🏳️ RENDIRSE</button>
        </div>
    </div>

<script>
    // --- DATABASE ---
    const DB = [
        { id: 1, nombre: "Bulbasaur", emoji: "🍃", saga: "Pokémon", tipo: "planta", rareza: "comun" },
        { id: 4, nombre: "Charmander", emoji: "🔥", saga: "Pokémon", tipo: "fuego", rareza: "comun" },
        { id: 7, nombre: "Squirtle", emoji: "💧", saga: "Pokémon", tipo: "agua", rareza: "comun" },
        { id: 101, nombre: "Goku", emoji: "👊", saga: "Dragon Ball", tipo: "fuego", rareza: "legendario" },
        { id: 102, nombre: "Vegeta", emoji: "👑", saga: "Dragon Ball", tipo: "agua", rareza: "epico" },
        { id: 103, nombre: "Gohan", emoji: "🧒", saga: "Dragon Ball", tipo: "planta", rareza: "raro" }
    ];

    const RAREZAS = { comun: 'var(--comun)', raro: 'var(--raro)', epico: 'var(--epico)', legendario: 'var(--legendario)' };
    const VENTAJAS = { fuego: 'planta', planta: 'agua', agua: 'fuego' };

    // --- STATE ---
    let inventario = JSON.parse(localStorage.getItem("gq_v7_inv")) || [];
    let equipoUids = JSON.parse(localStorage.getItem("gq_v7_team")) || [];
    
    // --- BATTLE ENGINE STATE ---
    let battle = {
        active: false,
        playerIdx: 0,
        playerTeam: [],
        enemy: null,
        playerDefending: false,
        enemyDefending: false,
        lastPlayerAction: '',
        lastEnemyAction: ''
    };

    function tab(btn, id) {
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.querySelectorAll('.pantalla').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(id).classList.add('active');
        if(id === 'lobby') renderLobby();
        if(id === 'pokedex') renderDex();
        if(id === 'equipo') renderEquipo();
    }

    function tirarGacha() {
        const rand = Math.random() * 100;
        let rareza = rand < 2 ? "legendario" : rand < 10 ? "epico" : rand < 30 ? "raro" : "comun";
        let opciones = DB.filter(p => p.rareza === rareza);
        const base = opciones[Math.floor(Math.random() * opciones.length)];
        const nuevo = { ...base, uid: "UID-"+Date.now()+"-"+Math.random(), lvl: 1, curHp: 100, energy: 0 };
        inventario.push(nuevo);
        localStorage.setItem("gq_v7_inv", JSON.stringify(inventario));
        alert(`¡Invocado: ${nuevo.nombre}!`);
        renderLobby();
    }

    // --- LÓGICA DE BATALLA ---
    function startBattle() {
        const team = inventario.filter(p => equipoUids.includes(p.uid));
        if(team.length === 0) return alert("¡Necesitas al menos 1 personaje en el equipo!");
        
        battle.active = true;
        battle.playerTeam = team.map(p => ({...p, maxHp: 100 + (p.lvl * 10), curHp: 100 + (p.lvl * 10), energy: 0}));
        battle.playerIdx = 0;
        
        // Crear enemigo aleatorio basado en el nivel medio del equipo
        const enemyBase = DB[Math.floor(Math.random()*DB.length)];
        battle.enemy = {...enemyBase, lvl: team[0].lvl, maxHp: 100 + (team[0].lvl * 8), curHp: 100 + (team[0].lvl * 8), energy: 0};
        
        document.getElementById('battle-scene').style.display = 'flex';
        log("¡Un " + battle.enemy.nombre + " salvaje aparece!");
        updateBattleUI();
    }

    function updateBattleUI() {
        const p = battle.playerTeam[battle.playerIdx];
        const e = battle.enemy;

        document.getElementById('player-name').innerText = `${p.nombre} (Nv.${p.lvl})`;
        document.getElementById('player-img').innerText = p.emoji;
        document.getElementById('player-hp').style.width = (p.curHp / p.maxHp * 100) + "%";
        
        document.getElementById('enemy-name').innerText = `${e.nombre} (Nv.${e.lvl})`;
        document.getElementById('enemy-img').innerText = e.emoji;
        document.getElementById('enemy-hp').style.width = (e.curHp / e.maxHp * 100) + "%";

        // Cargas de energía
        const pEnergy = document.getElementById('player-energy');
        pEnergy.innerHTML = '';
        for(let i=0; i<3; i++) pEnergy.innerHTML += `<div class="energy-dot ${i < p.energy ? 'filled' : ''}"></div>`;

        const eEnergy = document.getElementById('enemy-energy');
        eEnergy.innerHTML = '';
        for(let i=0; i<3; i++) eEnergy.innerHTML += `<div class="energy-dot ${i < e.energy ? 'filled' : ''}"></div>`;

        // Habilitar/Deshabilitar botones
        document.getElementById('btn-atk').disabled = p.energy < 1;
        document.getElementById('btn-super').disabled = p.energy < 2;
        document.getElementById('btn-def').disabled = battle.lastPlayerAction === 'defend';
    }

    function playerMove(move) {
        const p = battle.playerTeam[battle.playerIdx];
        const e = battle.enemy;
        battle.playerDefending = false;

        if(move === 'charge') {
            p.energy = Math.min(p.energy + 1, 3);
            log(`${p.nombre} está concentrando energía...`);
        } else if(move === 'defend') {
            battle.playerDefending = true;
            log(`${p.nombre} se pone en guardia.`);
        } else {
            let dmg = p.lvl * 10;
            if(move === 'super') { dmg *= 3; p.energy -= 2; log(`¡${p.nombre} lanza su ATAQUE ESPECIAL!`); }
            else { p.energy -= 1; log(`${p.nombre} ataca.`); }

            // Tabla de tipos
            if(VENTAJAS[p.tipo] === e.tipo) { dmg *= 1.5; log("¡Es muy efectivo!"); }
            if(VENTAJAS[e.tipo] === p.tipo) { dmg *= 0.75; log("No es muy efectivo..."); }

            if(battle.enemyDefending) { dmg /= 2; log("El rival mitigó el daño."); }
            e.curHp -= dmg;
        }

        battle.lastPlayerAction = move;
        if(e.curHp <= 0) return endBattle(true);
        
        setTimeout(enemyTurn, 800);
    }

    function enemyTurn() {
        const p = battle.playerTeam[battle.playerIdx];
        const e = battle.enemy;
        battle.enemyDefending = false;

        // IA Simple
        let move = 'charge';
        if(e.energy >= 2 && Math.random() > 0.3) move = 'super';
        else if(e.energy >= 1 && Math.random() > 0.5) move = 'attack';
        else if(Math.random() > 0.8 && battle.lastEnemyAction !== 'defend') move = 'defend';

        if(move === 'charge') {
            e.energy = Math.min(e.energy + 1, 3);
            log(`El rival carga energía.`);
        } else if(move === 'defend') {
            battle.enemyDefending = true;
            log(`El rival se prepara para defender.`);
        } else {
            let dmg = e.lvl * 8;
            if(move === 'super') { dmg *= 2.5; e.energy -= 2; log(`¡El rival lanza un golpe devastador!`); }
            else { e.energy -= 1; log(`El rival ataca.`); }

            if(battle.playerDefending) { dmg /= 2; log(`${p.nombre} bloqueó parte del golpe.`); }
            p.curHp -= dmg;
        }

        battle.lastEnemyAction = move;
        updateBattleUI();

        if(p.curHp <= 0) {
            log(`${p.nombre} ha caído...`);
            // Lógica de cambio automático o derrota aquí
            endBattle(false);
        }
    }

    function log(msg) {
        const l = document.getElementById('battle-log');
        l.innerHTML = `> ${msg}<br>` + l.innerHTML;
    }

    function endBattle(win) {
        battle.active = false;
        alert(win ? "¡VICTORIA! Tus personajes ganan XP." : "DERROTA...");
        if(win) {
            // Subir nivel a los del equipo
            equipoUids.forEach(uid => {
                let p = inventario.find(i => i.uid === uid);
                if(p) p.lvl++;
            });
            localStorage.setItem("gq_v7_inv", JSON.stringify(inventario));
        }
        document.getElementById('battle-scene').style.display = 'none';
        renderLobby();
    }

    function openSwitchMenu() {
        let msg = "Elige a quién cambiar:\n";
        battle.playerTeam.forEach((p, i) => {
            if(i !== battle.playerIdx && p.curHp > 0) msg += `${i}: ${p.nombre} (HP:${Math.floor(p.curHp)})\n`;
        });
        let choice = prompt(msg);
        if(choice !== null && battle.playerTeam[choice] && battle.playerTeam[choice].curHp > 0) {
            battle.playerIdx = parseInt(choice);
            log("¡Adelante " + battle.playerTeam[battle.playerIdx].nombre + "!");
            updateBattleUI();
        }
    }

    // --- RENDERERS BASICOS ---
    function renderLobby() {
        const scene = document.getElementById('hero-scene');
        const team = inventario.filter(p => equipoUids.includes(p.uid));
        scene.innerHTML = team.map((p, i) => `
            <div class="hero-spot">
                <div style="font-size: 0.7rem; color:var(--accent)">LV.${p.lvl}</div>
                <div class="fighter-emoji" style="font-size:${i===1?'8rem':'5rem'}">${p.emoji}</div>
                <div style="font-size:0.8rem">${p.nombre}</div>
            </div>
        `).join('') + `<button class="btn-action" style="position:absolute; bottom:20px; padding: 10px 40px; font-size:1.2rem;" onclick="startBattle()">¡LUCHAR!</button>`;
    }

    function renderEquipo() {
        const grid = document.getElementById('equipo-grid');
        grid.innerHTML = '';
        // Mostramos especies únicas en el gestor para simplificar esta versión
        let especies = [...new Set(inventario.map(p => p.id))];
        especies.forEach(id => {
            const p = inventario.find(x => x.id === id);
            const isSet = equipoUids.includes(p.uid);
            grid.innerHTML += `
                <div class="card" onclick="toggleTeam('${p.uid}')" style="border-color:${isSet ? 'var(--accent)' : 'var(--border)'}">
                    <span class="card-emoji">${p.emoji}</span>
                    <strong>${p.nombre}</strong><br>
                    <small>LV.${p.lvl}</small>
                </div>`;
        });
    }

    function toggleTeam(uid) {
        if(equipoUids.includes(uid)) equipoUids = equipoUids.filter(u => u !== uid);
        else if(equipoUids.length < 3) equipoUids.push(uid);
        localStorage.setItem("gq_v7_team", JSON.stringify(equipoUids));
        renderEquipo();
    }

    function renderDex() {
        const grid = document.getElementById('dex-grid');
        grid.innerHTML = DB.map(p => {
            const tiene = inventario.some(i => i.id === p.id);
            return `<div class="card ${tiene ? '' : 'locked'}"><span class="card-emoji">${p.emoji}</span><strong>${tiene ? p.nombre : '???'}</strong></div>`;
        }).join('');
    }

    function resetGame() { localStorage.clear(); location.reload(); }

    renderLobby();
</script>
</body>
</html>
