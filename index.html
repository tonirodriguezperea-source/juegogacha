<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gacha Quest Modular</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <button onclick="mostrar('lobby')">Lobby</button>
        <button onclick="mostrar('equipo')">Equipo</button>
        <button onclick="tirarGacha()">Invocar</button>
    </nav>

    <div id="pantalla-lobby" class="pantalla">
        <button class="btn-battle" onclick="iniciarBatalla()">¡A PELEAR!</button>
    </div>

    <div id="pantalla-equipo" class="pantalla" style="display:none;">
        </div>

    <script src="database.js"></script>
    <script src="logic.js"></script>
    <script src="battle.js"></script>
    <script>
        function mostrar(id) {
            document.querySelectorAll('.pantalla').forEach(p => p.style.display = 'none');
            document.getElementById('pantalla-' + id).style.display = 'block';
        }
    </script>
</body>
</html>
