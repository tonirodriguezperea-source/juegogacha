<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gacha Quest | RPG Manager</title>
    <style>
        :root {
            --bg-dark: #020617; --bg-panel: #0f172a; --accent: #38bdf8;
            --text-main: #f1f5f9; --text-dim: #94a3b8; --border: #1e293b;
            --select: #22c55e; --danger: #ef4444;
            /* Rarezas */
            --comun: #94a3b8; --raro: #4ade80; --epico: #a855f7; --legendario: #f59e0b;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { margin: 0; background-color: var(--bg-dark); color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        nav { display: flex; justify-content: center; background: var(--bg-panel); border-bottom: 2px solid var(--border); z-index: 100; }
        .nav-item { padding: 20px 25px; cursor: pointer; font-weight: bold; color: var(--text-dim); text-transform: uppercase; transition: 0.3s; border-bottom: 3px solid transparent; }
        .nav-item.active { color: var(--accent); border-bottom: 3px solid var(--accent); }

        .viewport { flex-grow: 1; overflow-y: auto; padding: 20px; }
        .pantalla { display: none; width: 100%; max-width: 1200px; margin: 0 auto; animation: fadeIn 0.3s ease; }
        .pantalla.active { display: flex; flex-direction: column; }

        /* LOBBY */
        .lobby-layout { display: grid; grid-template-columns: 1fr 320px; gap: 20px; }
        .hero-scene { 
            background: radial-gradient(circle, #1e293b 0%, #020617 100%); 
            border-radius: 20px; border: 2px solid var(--border); 
            display: flex; justify-content: center; align-items: flex-end; 
            padding-bottom: 80px; position: relative; height: 450px;
        }
        .hero-spot { display: flex; flex-direction: column; align-items: center; margin: 0 15px; }
        .hero-display { font-size: 6.5rem; filter: drop-shadow(0 0 10px var(--accent)); image-rendering: pixelated; }

        /* FILTROS Y BUSCADOR */
        .controls { background: var(--bg-panel); padding: 15px; border-radius: 12px; margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
        .search-input { background: var(--bg-dark); border: 1px solid var(--border); color: white; padding: 8px 15px; border-radius: 8px; flex-grow: 1; }
        .btn-filter { background: var(--border); border: none; color: white; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; font-weight: bold; }
        .btn-filter.active { background: var(--accent); color: black; }

        /* CARDS */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .card { background: var(--bg-panel); border: 2px solid var(--border); border-radius: 15px; padding: 12px; text-align: center; position: relative; cursor: pointer; transition: 0.2s; }
        .card:hover { border-color: var(--accent); transform: scale(1.02); }
        .card.locked { filter: grayscale(1) brightness(0.2); }
        .card-emoji { font-size: 3rem; margin: 5px 0; display: block; }
        .type-badge { font-size: 0.65rem; padding: 2px 8px; border-radius: 4px; font-weight: bold; text-transform: uppercase; }
        .rarity-line { height: 4px; width: 40px; margin: 5px auto; border-radius: 2px; }

        /* PANEL SELECCIÓN */
        #selection-panel {
            position: fixed; bottom: 0; left: 0; right: 0; height: 350px;
            background: #0f172a; border-top: 3px solid var(--accent);
            padding: 20px; z-index: 1000; display: none; overflow-y: auto;
        }
        .unit-row { display: flex; align-items: center; justify-content: space-between; background: #1e293b; padding: 10px 20px; border-radius: 12px; margin-bottom: 8px; border: 2px solid transparent; }
        .unit-row.active { border-color: var(--select); background: #064e3b; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <nav>
        <div class="nav-item active" onclick="tab(this, 'lobby')">Inicio</div>
        <div class="nav-item" onclick="tab(this, 'pokedex')">Pokedex</div>
        <div class="nav-item" onclick="tab(this, 'equipo')">Equipo</div>
        <div class="nav-item" onclick="tirarGacha()">Invocación</div>
    </nav>

    <div class="viewport">
        <section id="lobby" class="pantalla active">
            <div class="lobby-layout">
                <div class="hero-scene" id="hero-scene">
                    <button style="position:absolute; top:15px; left:15px; color:var(--danger); background:none; border:none; cursor:pointer;" onclick="resetGame()">[REINICIAR]</button>
                </div>
                <div id="lobby-news" class="news-panel" style="background:var(--bg-panel); padding:20px; border-radius:20px; border:1px solid var(--border);">
                    <h3 style="color:var(--accent); margin-top:0;">SISTEMA DE TIPOS</h3>
                    <p style="font-size:0.8rem; line-height:1.4;">
                        🔥 <b>FUEGO</b> vence a 🍃 Planta<br>
                        🍃 <b>PLANTA</b> vence a 💧 Agua<br>
                        💧 <b>AGUA</b> vence a 🔥 Fuego
                    </p>
                </div>
            </div>
        </section>

        <section id="pokedex" class="pantalla">
            <h1 style="text-align:center;">PIXEL-DEX</h1>
            <div class="grid" id="dex-grid"></div>
        </section>

        <section id="equipo" class="pantalla">
            <div class="controls">
                <input type="text" id="busqueda" class="search-input" placeholder="Buscar héroe..." oninput="renderEquipo()">
                <div style="display:flex; gap:5px;">
                    <button class="btn-filter active" data-saga="TODAS" onclick="setSaga('TODAS', this)">TODAS</button>
                    <button class="btn-filter" data-saga="Pokémon" onclick="setSaga('Pokémon', this)">POKÉMON</button>
                    <button class="btn-filter" data-saga="Dragon Ball" onclick="setSaga('Dragon Ball', this)">DBZ</button>
                </div>
                <div style="display:flex; gap:5px; border-left: 1px solid var(--border); padding-left:10px;">
                    <button class="btn-filter active" onclick="setOrden('id', this)">Nº</button>
                    <button class="btn-filter" onclick="setOrden('tipo', this)">TIPO</button>
                </div>
            </div>
            <div class="grid" id="equipo-grid"></div>
        </section>
    </div>

    <div id="selection-panel">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h2 id="panel-title" style="margin:0;">Seleccionar</h2>
            <button onclick="closePanel()" style="background:var(--danger); border:none; color:white; padding:5px 15px; border-radius:5px; cursor:pointer;">CERRAR</button>
        </div>
        <div id="units-list"></div>
    </div>

<script>
    const DB = [
        { id: 1, nombre: "Bulbasaur", emoji: "🍃", saga: "Pokémon", tipo: "planta", rareza: "comun" },
        { id: 4, nombre: "Charmander", emoji: "🔥", saga: "Pokémon", tipo: "fuego", rareza: "comun" },
        { id: 7, nombre: "Squirtle", emoji: "💧", saga: "Pokémon", tipo: "agua", rareza: "comun" },
        { id: 101, nombre: "Goku", emoji: "👊", saga: "Dragon Ball", tipo: "fuego", rareza: "legendario" },
        { id: 102, nombre: "Vegeta", emoji: "👑", saga: "Dragon Ball", tipo: "agua", rareza: "epico" },
        { id: 103, nombre: "Gohan", emoji: "🧒", saga: "Dragon Ball", tipo: "planta", rareza: "raro" }
    ];

    const COLORES = { fuego: '#f87171', agua: '#60a5fa', planta: '#4ade80' };
    const RAREZAS = { comun: 'var(--comun)', raro: 'var(--raro)', epico: 'var(--epico)', legendario: 'var(--legendario)' };

    let inventario = JSON.parse(localStorage.getItem("gq_v5_inv")) || [];
    let equipoUids = JSON.parse(localStorage.getItem("gq_v5_team")) || [];
    let currentSaga = 'TODAS';
    let currentOrder = 'id';

    function tab(btn, id) {
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.querySelectorAll('.pantalla').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(id).classList.add('active');
        closePanel();
        if(id === 'lobby') renderLobby();
        if(id === 'pokedex') renderDex();
        if(id === 'equipo') renderEquipo();
    }

    function tirarGacha() {
        const base = DB[Math.floor(Math.random() * DB.length)];
        const nuevo = {
            ...base,
            uid: "UID-" + Date.now() + "-" + Math.random(),
            lvl: 1 // SIEMPRE NIVEL 1
        };
        inventario.push(nuevo);
        localStorage.setItem("gq_v5_inv", JSON.stringify(inventario));
        alert(`¡Invocado: ${nuevo.nombre} (${nuevo.rareza.toUpperCase()})!`);
    }

    function renderLobby() {
        const scene = document.getElementById('hero-scene');
        const team = inventario.filter(p => equipoUids.includes(p.uid));
        scene.innerHTML = '<button style="position:absolute; top:15px; left:15px; color:var(--danger); background:none; border:none; cursor:pointer;" onclick="resetGame()">[REINICIAR]</button>';
        team.forEach((p, index) => {
            scene.innerHTML += `
                <div class="hero-spot">
                    <div class="hero-tag" style="color:${RAREZAS[p.rareza]}">LV. ${p.lvl}</div>
                    <div class="hero-display" style="font-size: ${index === 1 ? '9rem' : '6rem'}">${p.emoji}</div>
                    <div class="hero-tag">${p.nombre}</div>
                </div>`;
        });
        scene.innerHTML += `<button class="btn-battle" onclick="alert('IA de Combate cargando...')">READY</button>`;
    }

    function renderDex() {
        const grid = document.getElementById('dex-grid');
        grid.innerHTML = '';
        DB.forEach(p => {
            const tiene = inventario.some(inv => inv.id === p.id);
            grid.innerHTML += `
                <div class="card ${tiene ? '' : 'locked'}">
                    <div class="rarity-line" style="background:${RAREZAS[p.rareza]}"></div>
                    <span class="card-emoji">${p.emoji}</span>
                    <strong>${tiene ? p.nombre : '???'}</strong>
                    <div class="type-badge" style="color:${COLORES[p.tipo]}">${p.tipo}</div>
                </div>`;
        });
    }

    function setSaga(s, btn) {
        currentSaga = s;
        btn.parentElement.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderEquipo();
    }

    function setOrden(o, btn) {
        currentOrder = o;
        btn.parentElement.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderEquipo();
    }

    function renderEquipo() {
        const grid = document.getElementById('equipo-grid');
        const busqueda = document.getElementById('busqueda').value.toLowerCase();
        grid.innerHTML = '';
        
        let especies = {};
        inventario.forEach(p => {
            if(!especies[p.id]) especies[p.id] = {...p, cant: 0};
            especies[p.id].cant++;
        });

        let lista = Object.values(especies).filter(p => 
            (currentSaga === 'TODAS' || p.saga === currentSaga) &&
            p.nombre.toLowerCase().includes(busqueda)
        );

        lista.sort((a,b) => {
            if(currentOrder === 'tipo') return a.tipo.localeCompare(b.tipo);
            return a.id - b.id;
        });

        lista.forEach(p => {
            grid.innerHTML += `
                <div class="card" onclick="openPanel(${p.id})">
                    <div class="badge">x${p.cant}</div>
                    <span class="card-emoji">${p.emoji}</span>
                    <strong>${p.nombre}</strong>
                    <div class="rarity-line" style="background:${RAREZAS[p.rareza]}"></div>
                </div>`;
        });
    }

    function openPanel(idBase) {
        const panel = document.getElementById('selection-panel');
        const list = document.getElementById('units-list');
        const base = DB.find(x => x.id === idBase);
        panel.style.display = 'block';
        list.innerHTML = '';
        document.getElementById('panel-title').innerText = base.nombre + "s";

        inventario.filter(x => x.id === idBase).forEach(u => {
            const set = equipoUids.includes(u.uid);
            list.innerHTML += `
                <div class="unit-row ${set ? 'active' : ''}">
                    <div><span>${u.emoji}</span> <b>LV.${u.lvl}</b> <small style="color:var(--accent)">${u.rareza}</small></div>
                    <button class="btn-filter ${set ? 'active' : ''}" onclick="toggleUnit('${u.uid}')">${set ? 'QUITAR' : 'AÑADIR'}</button>
                </div>`;
        });
    }

    function toggleUnit(uid) {
        const idx = equipoUids.indexOf(uid);
        if(idx > -1) equipoUids.splice(idx, 1);
        else if(equipoUids.length < 3) equipoUids.push(uid);
        localStorage.setItem("gq_v5_team", JSON.stringify(equipoUids));
        const item = inventario.find(x => x.uid === uid);
        openPanel(item.id);
        renderEquipo();
    }

    function closePanel() { document.getElementById('selection-panel').style.display = 'none'; }
    function resetGame() { if(confirm("¿Reiniciar?")) { localStorage.clear(); location.reload(); } }

    renderLobby();
</script>
</body>
</html>
