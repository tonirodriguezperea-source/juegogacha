<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gacha Quest | Rebirth Edition</title>
    <style>
        :root {
            --bg-dark: #020617;
            --bg-panel: #0f172a;
            --accent: #38bdf8;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --border: #1e293b;
            --raro: #4ade80;
            --legendario: #f59e0b;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body {
            margin: 0;
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        nav {
            display: flex;
            justify-content: center;
            background: var(--bg-panel);
            border-bottom: 2px solid var(--border);
            z-index: 100;
        }

        .nav-item {
            padding: 20px 30px;
            cursor: pointer;
            font-weight: bold;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
            border-bottom: 3px solid transparent;
        }

        .nav-item.active {
            color: var(--accent);
            border-bottom: 3px solid var(--accent);
        }

        .viewport { flex-grow: 1; overflow-y: auto; position: relative; }
        .pantalla { display: none; padding: 20px; animation: fadeIn 0.4s ease; }
        .pantalla.active { display: flex; flex-direction: column; align-items: center; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* LOBBY */
        .lobby-container { display: grid; grid-template-columns: 1fr 300px; gap: 20px; width: 100%; height: 80vh; }
        
        .hero-scene {
            background: radial-gradient(circle, #1e293b 0%, #020617 100%);
            border-radius: 20px;
            border: 2px solid var(--border);
            display: flex;
            justify-content: center;
            align-items: flex-end;
            padding-bottom: 100px;
            position: relative;
        }

        .hero-spot { display: flex; flex-direction: column; align-items: center; margin: 0 20px; }
        .hero-display { font-size: 7rem; filter: drop-shadow(0 0 15px var(--accent)); image-rendering: pixelated; }
        .hero-tag { background: rgba(0,0,0,0.6); padding: 4px 12px; border-radius: 10px; font-size: 0.8rem; margin: 5px; border: 1px solid var(--border); }

        .news-panel { background: var(--bg-panel); border-radius: 20px; padding: 20px; border: 1px solid var(--border); }
        .news-item { background: #1e293b; padding: 12px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid var(--accent); font-size: 0.85rem; }

        .btn-battle {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: linear-gradient(135deg, var(--accent) 0%, #1d4ed8 100%);
            color: white; border: none; padding: 15px 60px; border-radius: 50px;
            font-size: 1.5rem; font-weight: 900; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        /* GRID */
        .dex-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; width: 100%; }
        .card { 
            background: var(--bg-panel); border: 2px solid var(--border); border-radius: 15px; 
            padding: 15px; text-align: center; position: relative; transition: 0.3s;
        }
        .card.locked { filter: grayscale(1) brightness(0.2); }
        .card.selected { border-color: var(--accent); background: #1e293b; box-shadow: 0 0 15px rgba(56, 189, 248, 0.2); }
        .card-emoji { font-size: 3rem; margin: 10px 0; }

        .btn-select { 
            background: var(--accent); border: none; padding: 8px; border-radius: 5px; 
            cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; color: var(--bg-dark);
        }
        .btn-select.active { background: #f43f5e; color: white; }
    </style>
</head>
<body>

    <nav>
        <div class="nav-item active" onclick="tab(this, 'lobby')">Inicio</div>
        <div class="nav-item" onclick="tab(this, 'coleccion')">Pixel-Dex</div>
        <div class="nav-item" onclick="tab(this, 'equipo')">Equipo</div>
        <div class="nav-item" onclick="tirarGacha()">Invocación</div>
    </nav>

    <div class="viewport">
        <section id="lobby" class="pantalla active">
            <div class="lobby-container">
                <div class="hero-scene" id="hero-scene">
                    <button class="btn-battle">BATTLE</button>
                </div>
                <div class="news-panel">
                    <h3 style="color: var(--accent); margin-top: 0;">NOTICIAS</h3>
                    <div class="news-item"><b>EQUIPO:</b> Selecciona hasta 3 héroes en la pestaña "Equipo".</div>
                    <div class="news-item"><b>DATA:</b> Los personajes repetidos tienen IDs únicos.</div>
                </div>
            </div>
        </section>

        <section id="coleccion" class="pantalla">
            <h1>PIXEL-DEX</h1>
            <div class="dex-grid" id="dex-container"></div>
        </section>

        <section id="equipo" class="pantalla">
            <h1>GESTIÓN DE EQUIPO</h1>
            <p id="counter-equipo">Seleccionados: 0 / 3</p>
            <div class="dex-grid" id="equipo-container"></div>
        </section>
    </div>

<script>
    const DB_PERSONAJES = [
        { id: 1, nombre: "Bulbasaur", saga: "Pokémon", tipo: "Planta", emoji: "🍃" },
        { id: 4, nombre: "Charmander", saga: "Pokémon", tipo: "Fuego", emoji: "🔥" },
        { id: 7, nombre: "Squirtle", saga: "Pokémon", tipo: "Agua", emoji: "💧" },
        { id: 101, nombre: "Goku", saga: "Dragon Ball", tipo: "Fuego", emoji: "👊" },
        { id: 102, nombre: "Vegeta", saga: "Dragon Ball", tipo: "Fuego", emoji: "👑" },
        { id: 103, nombre: "Gohan", saga: "Dragon Ball", tipo: "Viento", emoji: "🧒" }
    ];

    let inventario = JSON.parse(localStorage.getItem("gq_inv")) || [];
    let equipoUids = JSON.parse(localStorage.getItem("gq_team_uids")) || [];

    function tab(btn, id) {
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.querySelectorAll('.pantalla').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(id).classList.add('active');
        
        if(id === 'lobby') renderLobby();
        if(id === 'coleccion') renderDex();
        if(id === 'equipo') renderEquipo();
    }

    function tirarGacha() {
        const base = DB_PERSONAJES[Math.floor(Math.random() * DB_PERSONAJES.length)];
        const nuevo = {
            ...base,
            uid: "UID-" + Date.now() + "-" + Math.floor(Math.random() * 1000), 
            lvl: 1,
            hp: 100,
            atk: 20
        };
        inventario.push(nuevo);
        localStorage.setItem("gq_inv", JSON.stringify(inventario));
        alert("¡Has invocado a " + nuevo.nombre + "!");
    }

    function renderLobby() {
        const scene = document.getElementById('hero-scene');
        const team = inventario.filter(p => equipoUids.includes(p.uid));
        
        scene.innerHTML = '';
        team.forEach((p, index) => {
            const size = index === 1 ? '10rem' : '7rem';
            scene.innerHTML += `
                <div class="hero-spot">
                    <div class="hero-tag">LV. ${p.lvl}</div>
                    <div class="hero-display" style="font-size: ${size}">${p.emoji}</div>
                    <div class="hero-tag">${p.nombre}</div>
                </div>
            `;
        });
        scene.innerHTML += `<button class="btn-battle" onclick="alert('Próximamente: Sistema de combate mejorado')">BATTLE</button>`;
    }

    function renderDex() {
        const container = document.getElementById('dex-container');
        container.innerHTML = '';
        DB_PERSONAJES.forEach(p => {
            const obtenido = inventario.some(inv => inv.id === p.id);
            container.innerHTML += `
                <div class="card ${obtenido ? '' : 'locked'}">
                    <div style="font-size: 0.7rem; color: var(--accent)">#${String(p.id).padStart(3, '0')}</div>
                    <div class="card-emoji">${p.emoji}</div>
                    <strong>${obtenido ? p.nombre : '???'}</strong>
                </div>
            `;
        });
    }

    function renderEquipo() {
        const container = document.getElementById('equipo-container');
        document.getElementById('counter-equipo').innerText = `Seleccionados: ${equipoUids.length} / 3`;
        container.innerHTML = '';
        
        inventario.forEach(p => {
            const seleccionado = equipoUids.includes(p.uid);
            container.innerHTML += `
                <div class="card ${seleccionado ? 'selected' : ''}">
                    <div class="card-emoji">${p.emoji}</div>
                    <strong>${p.nombre}</strong><br>
                    <small>LV. ${p.lvl}</small>
                    <button class="btn-select ${seleccionado ? 'active' : ''}" onclick="toggleEquipo('${p.uid}')">
                        ${seleccionado ? 'QUITAR' : 'ELEGIR'}
                    </button>
                </div>
            `;
        });
    }

    function toggleEquipo(uid) {
        const index = equipoUids.indexOf(uid);
        if (index > -1) {
            // Si ya está, lo quitamos
            equipoUids.splice(index, 1);
        } else {
            // Si no está, comprobamos el límite de 3
            if (equipoUids.length < 3) {
                equipoUids.push(uid);
            } else {
                alert("Tu equipo ya tiene 3 miembros. Quita uno primero.");
            }
        }
        localStorage.setItem("gq_team_uids", JSON.stringify(equipoUids));
        renderEquipo();
    }

    // Inicio
    renderLobby();
</script>
</body>
</html>
