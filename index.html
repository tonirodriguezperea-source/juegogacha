<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gacha Quest | Battle System</title>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --primary: #38bdf8; --text: #f1f5f9;
            --fuego: #f87171; --agua: #60a5fa; --planta: #4ade80; --viento: #fbbf24;
        }
        body { margin: 0; font-family: 'Courier New', monospace; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; height: 100vh; }
        .pantalla { text-align: center; width: 95%; max-width: 800px; height: 90vh; display: flex; flex-direction: column; }
        .oculto { display: none !important; }
        .btn { background: var(--primary); border: 4px solid #fff; padding: 10px 20px; font-weight: bold; cursor: pointer; margin: 5px; }
        
        /* --- ESTILOS DE COMBATE --- */
        .battle-arena { display: flex; justify-content: space-between; align-items: flex-end; padding: 40px 20px; background: #1e293b; border: 4px solid #334155; border-radius: 10px; margin-top: 20px; min-height: 250px; }
        .fighter { width: 45%; }
        .sprite-batalla { font-size: 5rem; image-rendering: pixelated; margin-bottom: 10px; }
        .hb-container { background: #451a1a; border: 2px solid #fff; height: 15px; width: 100%; border-radius: 5px; overflow: hidden; }
        .hb-fill { background: #4ade80; height: 100%; width: 100%; transition: width 0.3s; }
        .battle-log { background: #000; border: 2px solid #52525b; padding: 10px; height: 80px; overflow-y: auto; font-size: 0.8rem; margin-top: 10px; text-align: left; }
    </style>
</head>
<body>

    <section id="p-inicio" class="pantalla">
        <h1 style="font-size: 3rem;">GACHA QUEST</h1>
        <button class="btn" onclick="navegar('menu')">START</button>
    </section>

    <section id="p-menu" class="pantalla oculto">
        <h2>CENTRO DE MANDO</h2>
        <button class="btn" onclick="tirarGacha()">INVOCAR (GACHA)</button>
        <button class="btn" onclick="prepararCombate()">COMBATE (ARENA)</button>
        <button class="btn" onclick="navegar('album')">COLECCIÓN</button>
    </section>

    <section id="p-combate" class="pantalla oculto">
        <h2 id="battle-status">¡PREPÁRATE!</h2>
        
        <div class="battle-arena">
            <div class="fighter" id="player-side">
                <div class="sprite-batalla" id="p-img">👤</div>
                <div style="font-size: 0.8rem;" id="p-name">TU HÉROE</div>
                <div class="hb-container"><div id="p-hp-bar" class="hb-fill"></div></div>
                <div style="font-size: 0.7rem;">HP: <span id="p-hp-txt">100/100</span></div>
            </div>

            <div style="font-weight: bold; margin-bottom: 50px;">VS</div>

            <div class="fighter" id="enemy-side">
                <div class="sprite-batalla" id="e-img">👾</div>
                <div style="font-size: 0.8rem;" id="e-name">ENEMIGO</div>
                <div class="hb-container"><div id="e-hp-bar" class="hb-fill"></div></div>
                <div style="font-size: 0.7rem;">HP: <span id="e-hp-txt">100/100</span></div>
            </div>
        </div>

        <div class="battle-log" id="log">Bienvenido a la Arena...</div>

        <div id="battle-controls" style="margin-top: 10px;">
            <button class="btn" onclick="ataqueJugador()">ATACAR</button>
            <button class="btn" style="background: #94a3b8" onclick="navegar('menu')">HUIR</button>
        </div>
        <button id="btn-finalizar" class="btn oculto" onclick="navegar('menu')">VOLVER AL MENÚ</button>
    </section>

    <script>
        // --- BASE DE DATOS Y LÓGICA ANTERIOR ---
        const database = [
            { id: 1, saga: "Kanto", nombre: "Bulbasaur", tipo: "Planta", emoji: "🍃" },
            { id: 2, saga: "Kanto", nombre: "Charmander", tipo: "Fuego", emoji: "🔥" },
            { id: 3, saga: "Kanto", nombre: "Squirtle", tipo: "Agua", emoji: "💧" }
        ];

        const tablaTipos = {
            "Fuego": { "Planta": 2, "Agua": 0.5, "Fuego": 1 },
            "Agua": { "Fuego": 2, "Planta": 0.5, "Agua": 1 },
            "Planta": { "Agua": 2, "Fuego": 0.5, "Planta": 1 }
        };

        let miColeccion = JSON.parse(localStorage.getItem("dex_coleccion")) || [];
        
        // --- VARIABLES DE COMBATE ---
        let pActual, eActual;
        let pHP, eHP;

        function prepararCombate() {
            if(miColeccion.length === 0) return alert("¡Primero necesitas invocar a alguien!");
            
            // Elegimos tu último personaje capturado
            pActual = miColeccion[miColeccion.length - 1];
            pHP = pActual.hp;

            // Generamos un enemigo al azar
            const baseE = database[Math.floor(Math.random() * database.length)];
            eActual = {...baseE, hp: 100, atk: 15, calidad: "Raro"};
            eHP = eActual.hp;

            // Actualizar UI
            document.getElementById('p-name').innerText = pActual.nombre;
            document.getElementById('p-img').innerText = pActual.emoji;
            document.getElementById('e-name').innerText = eActual.nombre;
            document.getElementById('e-img').innerText = eActual.emoji;
            
            actualizarBarras();
            document.getElementById('log').innerHTML = "¡Un " + eActual.nombre + " salvaje aparece!";
            document.getElementById('battle-controls').classList.remove('oculto');
            document.getElementById('btn-finalizar').classList.add('oculto');
            
            navegar('combate');
        }

        function ataqueJugador() {
            // Calcular multiplicador de tipo
            let multi = 1;
            if(tablaTipos[pActual.tipo] && tablaTipos[pActual.tipo][eActual.tipo]) {
                multi = tablaTipos[pActual.tipo][eActual.tipo];
            }

            let daño = Math.floor(pActual.atk * multi);
            eHP -= daño;
            if(eHP < 0) eHP = 0;

            logMsg(`¡${pActual.nombre} ataca! Hace ${daño} de daño. ${multi > 1 ? '¡Es muy eficaz!' : ''}`);
            actualizarBarras();

            if(eHP <= 0) {
                logMsg("¡Has ganado el combate!");
                terminarBatalla();
            } else {
                // Turno del enemigo tras 1 segundo
                document.getElementById('battle-controls').classList.add('oculto');
                setTimeout(ataqueEnemigo, 1000);
            }
        }

        function ataqueEnemigo() {
            let daño = eActual.atk;
            pHP -= daño;
            if(pHP < 0) pHP = 0;

            logMsg(`¡${eActual.nombre} contraataca! Hace ${daño} de daño.`);
            actualizarBarras();

            if(pHP <= 0) {
                logMsg("¡Tu héroe ha sido derrotado!");
                terminarBatalla();
            } else {
                document.getElementById('battle-controls').classList.remove('oculto');
            }
        }

        function actualizarBarras() {
            const pPorcentaje = (pHP / pActual.hp) * 100;
            const ePorcentaje = (eHP / eActual.hp) * 100;
            
            document.getElementById('p-hp-bar').style.width = pPorcentaje + "%";
            document.getElementById('e-hp-bar').style.width = ePorcentaje + "%";
            document.getElementById('p-hp-txt').innerText = `${Math.floor(pHP)}/${pActual.hp}`;
            document.getElementById('e-hp-txt').innerText = `${Math.floor(eHP)}/${eActual.hp}`;
        }

        function logMsg(msg) {
            const l = document.getElementById('log');
            l.innerHTML += `<br>> ${msg}`;
            l.scrollTop = l.scrollHeight;
        }

        function terminarBatalla() {
            document.getElementById('battle-controls').classList.add('oculto');
            document.getElementById('btn-finalizar').classList.remove('oculto');
        }

        function navegar(id) {
            document.querySelectorAll('.pantalla').forEach(p => p.classList.add('oculto'));
            document.getElementById('p-' + id).classList.remove('oculto');
        }

        // ... (Aquí van el resto de funciones como tirarGacha del código anterior)
    </script>
</body>
</html>
