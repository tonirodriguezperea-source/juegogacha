<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gacha Quest | Squad Manager</title>
    <style>
        :root {
            --bg-dark: #020617; --bg-panel: #0f172a; --accent: #38bdf8;
            --text-main: #f1f5f9; --text-dim: #94a3b8; --border: #1e293b;
            --select: #22c55e;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { margin: 0; background-color: var(--bg-dark); color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* NAVEGACIÓN */
        nav { display: flex; justify-content: center; background: var(--bg-panel); border-bottom: 2px solid var(--border); z-index: 100; }
        .nav-item { padding: 20px 30px; cursor: pointer; font-weight: bold; color: var(--text-dim); text-transform: uppercase; transition: 0.3s; border-bottom: 3px solid transparent; }
        .nav-item.active { color: var(--accent); border-bottom: 3px solid var(--accent); }

        .viewport { flex-grow: 1; overflow-y: auto; padding: 20px; }
        .pantalla { display: none; flex-direction: column; align-items: center; animation: fadeIn 0.3s ease; }
        .pantalla.active { display: flex; }

        /* LOBBY */
        .hero-scene { 
            background: radial-gradient(circle, #1e293b 0%, #020617 100%); 
            border-radius: 20px; border: 2px solid var(--border); 
            display: flex; justify-content: center; align-items: flex-end; 
            padding-bottom: 80px; position: relative; width: 100%; max-width: 900px; height: 400px;
        }
        .hero-spot { display: flex; flex-direction: column; align-items: center; margin: 0 20px; }
        .hero-display { font-size: 6rem; filter: drop-shadow(0 0 10px var(--accent)); }
        .hero-tag { background: rgba(0,0,0,0.6); padding: 4px 12px; border-radius: 10px; font-size: 0.8rem; margin: 5px; border: 1px solid var(--border); }
        .btn-reset { position: absolute; top: 20px; left: 20px; background: #451a1a; color: #f87171; border: 1px solid #7f1d1d; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 0.7rem; }

        /* GESTIÓN EQUIPO */
        .controls { display: flex; gap: 10px; margin-bottom: 20px; width: 100%; max-width: 800px; }
        .search-bar { background: var(--bg-panel); border: 1px solid var(--border); color: white; padding: 10px; border-radius: 8px; flex-grow: 1; }
        
        .dex-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; width: 100%; max-width: 1000px; }
        .card { background: var(--bg-panel); border: 2px solid var(--border); border-radius: 15px; padding: 10px; text-align: center; cursor: pointer; position: relative; }
        .card:hover { border-color: var(--accent); }
        .card-emoji { font-size: 2.5rem; }
        .badge { position: absolute; top: -5px; right: -5px; background: var(--accent); color: black; font-weight: bold; padding: 2px 8px; border-radius: 10px; font-size: 0.7rem; }

        /* PANEL DESPLEGABLE DE INSTANCIAS */
        #instancias-panel {
            position: fixed; bottom: 0; left: 0; right: 0; height: 300px;
            background: #0f172a; border-top: 3px solid var(--accent);
            padding: 20px; z-index: 1000; display: none; overflow-y: auto;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
        }
        .instancia-row {
            display: flex; align-items: center; justify-content: space-between;
            background: #1e293b; padding: 10px 20px; border-radius: 10px; margin-bottom: 10px;
            border: 1px solid transparent;
        }
        .instancia-row.selected { border-color: var(--select); background: #14532d; }

        .btn-select-mini { background: var(--accent); border: none; padding: 5px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <nav>
        <div class="nav-item active" onclick="tab(this, 'lobby')">Inicio</div>
        <div class="nav-item" onclick="tab(this, 'equipo')">Equipo</div>
        <div class="nav-item" onclick="tirarGacha()">Gacha</div>
    </nav>

    <div class="viewport">
        <section id="lobby" class="pantalla active">
            <div class="hero-scene" id="hero-scene">
                </div>
            <div style="margin-top: 20px; text-align: center;">
                <h3 id="team-status">Equipo: 0/3</h3>
            </div>
        </section>

        <section id="equipo" class="pantalla">
            <div class="controls">
                <input type="text" id="busqueda" class="search-bar" placeholder="Buscar por nombre..." oninput="renderEquipo()">
                <button onclick="setOrden('lvl')" class="btn-select-mini">Nivel</button>
                <button onclick="setOrden('id')" class="btn-select-mini">ID</button>
            </div>
            <div class="dex-grid" id="equipo-container"></div>
        </section>
    </div>

    <div id="instancias-panel">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h3 id="panel-titulo">Selecciona un Guerrero</h3>
            <button onclick="cerrarPanel()" style="background: #ef4444; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer;">CERRAR</button>
        </div>
        <div id="instancias-lista"></div>
    </div>

<script>
    const DB = [
        { id: 1, nombre: "Bulbasaur", emoji: "🍃", saga: "Pokémon" },
        { id: 4, nombre: "Charmander", emoji: "🔥", saga: "Pokémon" },
        { id: 7, nombre: "Squirtle", emoji: "💧", saga: "Pokémon" },
        { id: 101, nombre: "Goku", emoji: "👊", saga: "Dragon Ball" },
        { id: 102, nombre: "Vegeta", emoji: "👑", saga: "Dragon Ball" },
        { id: 103, nombre: "Gohan", emoji: "🧒", saga: "Dragon Ball" }
    ];

    let inventario = JSON.parse(localStorage.getItem("gq_v3_inv")) || [];
    let equipoUids = JSON.parse(localStorage.getItem("gq_v3_team")) || [];
    let ordenActual = 'id';

    function tab(btn, id) {
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.querySelectorAll('.pantalla').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(id).classList.add('active');
        if(id === 'lobby') renderLobby();
        if(id === 'equipo') { cerrarPanel(); renderEquipo(); }
    }

    function tirarGacha() {
        const base = DB[Math.floor(Math.random() * DB.length)];
        const nuevo = {
            ...base,
            uid: "UID-" + Date.now() + "-" + Math.random(),
            lvl: Math.floor(Math.random() * 10) + 1
        };
        inventario.push(nuevo);
        localStorage.setItem("gq_v3_inv", JSON.stringify(inventario));
        alert(`¡Ha aparecido ${nuevo.nombre} Lv.${nuevo.lvl}!`);
        if(document.getElementById('equipo').classList.contains('active')) renderEquipo();
    }

    function renderLobby() {
        const scene = document.getElementById('hero-scene');
        const team = inventario.filter(p => equipoUids.includes(p.uid));
        document.getElementById('team-status').innerText = `Equipo: ${team.length}/3`;
        
        scene.innerHTML = '<button class="btn-reset" onclick="reset()">REINICIAR</button>';
        team.forEach((p, index) => {
            const size = index === 1 ? '9rem' : '6.5rem';
            scene.innerHTML += `
                <div class="hero-spot">
                    <div class="hero-tag">LV. ${p.lvl}</div>
                    <div class="hero-display" style="font-size: ${size}">${p.emoji}</div>
                    <div class="hero-tag">${p.nombre}</div>
                </div>
            `;
        });
    }

    function renderEquipo() {
        const container = document.getElementById('equipo-container');
        const texto = document.getElementById('busqueda').value.toLowerCase();
        container.innerHTML = '';

        // Agrupamos solo para mostrar el icono principal de cada especie
        let especies = {};
        inventario.forEach(p => {
            if(!especies[p.id]) especies[p.id] = {...p, cantidad: 0};
            especies[p.id].cantidad++;
        });

        let lista = Object.values(especies).filter(p => p.nombre.toLowerCase().includes(texto));
        
        lista.forEach(p => {
            container.innerHTML += `
                <div class="card" onclick="abrirPanel(${p.id})">
                    <div class="badge">x${p.cantidad}</div>
                    <div class="card-emoji">${p.emoji}</div>
                    <strong>${p.nombre}</strong>
                </div>
            `;
        });
    }

    function abrirPanel(idBase) {
        const panel = document.getElementById('instancias-panel');
        const lista = document.getElementById('instancias-lista');
        const personajeBase = DB.find(p => p.id === idBase);
        
        document.getElementById('panel-titulo').innerText = `Tus ${personajeBase.nombre}s`;
        panel.style.display = 'block';
        lista.innerHTML = '';

        // Filtrar todos los que tengo de esa especie
        let misPersonajes = inventario.filter(p => p.id === idBase);
        
        // Ordenar el panel según nivel
        misPersonajes.sort((a,b) => b.lvl - a.lvl);

        misPersonajes.forEach(p => {
            const isSel = equipoUids.includes(p.uid);
            lista.innerHTML += `
                <div class="instancia-row ${isSel ? 'selected' : ''}">
                    <div>
                        <span style="font-size: 1.5rem">${p.emoji}</span>
                        <strong> LV. ${p.lvl}</strong>
                        <small style="color: var(--text-dim); margin-left: 10px;">ID: ${p.uid.slice(-4)}</small>
                    </div>
                    <button class="btn-select-mini" onclick="toggleHero('${p.uid}')">
                        ${isSel ? 'QUITAR' : 'ELEGIR'}
                    </button>
                </div>
            `;
        });
    }

    function toggleHero(uid) {
        const idx = equipoUids.indexOf(uid);
        if(idx > -1) {
            equipoUids.splice(idx, 1);
        } else {
            if(equipoUids.length < 3) equipoUids.push(uid);
            else alert("Equipo lleno.");
        }
        localStorage.setItem("gq_v3_team", JSON.stringify(equipoUids));
        
        // Refrescar panel y equipo
        const p = inventario.find(i => i.uid === uid);
        abrirPanel(p.id);
        renderEquipo();
    }

    function cerrarPanel() { document.getElementById('instancias-panel').style.display = 'none'; }
    
    function setOrden(o) { ordenActual = o; renderEquipo(); }

    function reset() { 
        if(confirm("¿Borrar partida?")) { 
            localStorage.clear(); 
            location.reload(); 
        } 
    }

    renderLobby();
</script>
</body>
</html>
