<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gacha Quest</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <button class="nav-btn" onclick="mostrar('lobby')">🏠 Inicio</button>
        <button class="nav-btn" onclick="mostrar('equipo')">🛡️ Equipo</button>
        <button class="nav-btn gacha-btn" onclick="tirarGacha()">✨ Invocar</button>
    </nav>

    <div class="viewport">
        <div id="pantalla-lobby" class="pantalla">
            <div id="hero-display" class="info-photo"></div>
            <button class="nav-btn" style="width:100%; padding:20px; font-size:1.5rem" onclick="iniciarBatalla()">¡A LUCHAR!</button>
        </div>

        <div id="pantalla-equipo" class="pantalla" style="display:none;">
            <div class="equipo-layout">
                <div id="sagas-list"></div>
                <aside class="info-panel">
                    <div id="info-photo" class="info-photo">❓</div>
                    <h2 id="info-name">Héroe</h2>
                    <p id="info-desc">Pasa el ratón para ver detalles.</p>
                    <p>Dex: <span id="info-dex">-</span> | Tipo: <span id="info-tipo">-</span></p>
                    <p>Saga: <span id="info-saga">-</span></p>
                </aside>
            </div>
        </div>
    </div>

    <div id="battle-screen">
        <div class="battle-arena">
            <div class="fighter">
                <div class="hp-container"><div id="player-hp-bar" class="hp-fill"></div></div>
                <div id="player-battle-img" class="fighter-emoji">❓</div>
            </div>
            <h2 style="color:var(--danger)">VS</h2>
            <div class="fighter">
                <div class="hp-container"><div id="enemy-hp-bar" class="hp-fill"></div></div>
                <div id="enemy-battle-img" class="fighter-emoji">👾</div>
            </div>
        </div>
        <div id="battle-log"></div>
        <button class="nav-btn" onclick="document.getElementById('battle-screen').style.display='none'">HUIR</button>
    </div>

    <script src="database.js"></script>
    <script src="logic.js"></script>
    <script>
        function mostrar(id) {
            document.querySelectorAll('.pantalla').forEach(p => p.style.display = 'none');
            document.getElementById('pantalla-' + id).style.display = 'block';
            if(id === 'equipo') renderEquipo();
            if(id === 'lobby') renderLobby();
        }
        window.onload = () => mostrar('lobby');
    </script>
</body>
</html>
