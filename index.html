<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Gacha Quest</title>
</head>
<body>
    <nav>
        <button class="nav-btn" onclick="mostrar('lobby')">🏠 Inicio</button>
        <button class="nav-btn" onclick="mostrar('equipo')">🛡️ Equipo</button>
        <button class="nav-btn gacha-btn" onclick="tirarGacha()">✨ Invocar</button>
    </nav>

    <div id="pantalla-lobby" class="pantalla">
        <div class="lobby-container">
            <div class="main-stage">
                <div id="hero-display" class="hero-display"></div>
                <button class="btn-play" onclick="iniciarBatalla()">¡A LUCHAR!</button>
            </div>
            <div class="news-sidebar">
                <h3>NOTICIAS</h3>
                <p>Evento x2 Probabilidad</p>
                <button onclick="borrarPartida()" style="color:red; background:none; border:1px solid red; cursor:pointer;">Borrar Datos</button>
            </div>
        </div>
    </div>

    <div id="battle-screen">
        <div class="battle-arena">
            <div class="fighter">
                <div class="hp-wrapper"><div id="player-hp-bar" class="hp-fill"></div></div>
                <div id="player-battle-img"></div>
                <h3 id="player-battle-name">Jugador</h3>
            </div>
            <div class="vs-badge">VS</div>
            <div class="fighter">
                <div class="hp-wrapper"><div id="enemy-hp-bar" class="hp-fill"></div></div>
                <div id="enemy-battle-img"></div>
                <h3 id="enemy-battle-name">Rival</h3>
            </div>
        </div>
        <div id="battle-log"></div>
        <div class="actions-grid">
            <button class="btn-action" onclick="playerMove('ataque')">Ataque</button>
            <button class="btn-action" onclick="playerMove('recargar')">Recargar</button>
        </div>
    </div>

    <script src="database.js"></script>
    <script src="logic.js"></script>
    <script src="battle.js"></script>
    <script>
        function mostrar(id) {
            document.querySelectorAll('.pantalla').forEach(p => p.style.display = 'none');
            const target = document.getElementById('pantalla-' + id);
            if(target) target.style.display = 'block';
            if(id === 'lobby') renderLobby();
        }
        window.onload = () => mostrar('lobby');
    </script>
</body>
</html>
